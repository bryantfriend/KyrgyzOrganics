<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Product</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2a24;
      background: #f7f5ef;
    }
    main {
      width: min(620px, 100%);
      padding: 24px;
      border: 1px solid #d9d5c9;
      border-radius: 8px;
      background: #fffdfa;
      box-shadow: 0 18px 45px rgba(42, 47, 38, 0.12);
    }
    .eyebrow {
      margin: 0 0 8px;
      color: #155b39;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 8vw, 3.6rem); line-height: 1; }
    p { margin: 0 0 14px; color: #68726b; font-size: 1rem; }
    button {
      min-height: 42px;
      padding: 9px 14px;
      border: 1px solid #27724f;
      border-radius: 8px;
      color: #fff;
      background: #27724f;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">OAKO short link</p>
    <h1>Opening product</h1>
    <p id="message">Preparing the Glovo web product link...</p>
    <form id="fallbackForm" method="get" hidden>
      <button type="submit">Open Product in Browser</button>
    </form>
  </main>

  <script src="q.js"></script>
</body>
</html>
