<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME MUN Box - Kyrgyz Organic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Fallback State -->
    <div class="fallback-message" id="fallbackMessage">
        <h2>Campaign has ended</h2>
        <p>This Prime MUN offer is no longer active.</p>
        <a href="/">Return to Main Site</a>
    </div>

    <!-- Main Landing Section -->
    <main class="landing-container" id="mainContainer">
        <!-- Logo -->
        <header class="logo-header">
            <div class="logo-icon">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="15" cy="20" r="10" stroke="#7CB342" stroke-width="4"/>
                    <circle cx="25" cy="20" r="10" stroke="#7CB342" stroke-width="4"/>
                </svg>
            </div>
            <div class="logo-text">
                <span class="brand-name">KYRGYZ</span>
                <span class="brand-sub">ORGANIC</span>
            </div>
        </header>

        <!-- Product Titles -->
        <section class="title-section">
            <h1 id="headline">PRIME MUN BOX</h1>
            <div class="separator">
                <div class="line"></div>
                <!-- Optional small icon or text in separator -->
                <div class="line"></div>
            </div>
            <p id="subheadline" class="subheadline"></p>
        </section>

        <!-- Product Showcase -->
        <section class="product-section">
            <div class="image-wrapper">
                <img src="" alt="PRIME MUN Box" id="productImage" class="product-image">
                <div class="glow-effect"></div>
            </div>
        </section>

        <!-- Highlights & Action -->
        <footer class="action-section">
            <p id="optionalLine" class="optional-line"></p>
            
            <!-- Pie Icon (using SVG) -->
            <div class="dessert-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 21a9 9 0 0 0 9-9H3a9 9 0 0 0 9 9Z"/><path d="M12 12V3"/><path d="M16.2 7.8 12 12"/><path d="M7.8 7.8 12 12"/><path d="M12 8a4 4 0 0 1 4 4"/><path d="M8 12a4 4 0 0 1 4-4"/>
                </svg>
            </div>

            <button id="ctaButton" class="btn-glovo">
                Order via Glovo
                <span class="location-dot"></span>
            </button>

            <div class="delivery-info">
                <span class="bolt">⚡</span>
                <span>Delivery in under 60 minutes</span>
                <div class="decor-lines"></div>
            </div>
        </footer>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
