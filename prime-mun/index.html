<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIME MUN Box - Kyrgyz Organic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Particle Background Overlay -->
    <div id="particleBg" class="particle-overlay"></div>
    <!-- Fallback State -->
    <div class="fallback-message" id="fallbackMessage">
        <h2>Campaign has ended</h2>
        <p>This Prime MUN offer is no longer active.</p>
        <a href="/">Return to Main Site</a>
    </div>

    <!-- Main Landing Section -->
    <main class="landing-container" id="mainContainer">
        <!-- Logo -->
        <header class="logo-header" style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
            <img id="brandLogo" src="" style="height: auto; width: auto; max-width: 180px; max-height: 60px; object-fit: contain;">
        </header>

        <!-- Product Titles -->
        <section class="title-section">
            <h1 id="headline">PRIME MUN BOX</h1>
            <img id="headlineImage" class="content-image headline-image" alt="Campaign headline" hidden>
            <div class="separator">
                <div class="line"></div>
                <!-- Optional small icon or text in separator -->
                <div class="line"></div>
            </div>
            <p id="subheadline" class="subheadline"></p>
            <img id="subheadlineImage" class="content-image subheadline-image" alt="Campaign subheadline" hidden>
            <div id="countdownCard" class="countdown-card" hidden>
                <p class="countdown-label">Offer ends in</p>
                <div class="countdown-grid">
                    <div class="countdown-unit">
                        <span id="countdownDays">00</span>
                        <small>Days</small>
                    </div>
                    <div class="countdown-unit">
                        <span id="countdownHours">00</span>
                        <small>Hours</small>
                    </div>
                    <div class="countdown-unit">
                        <span id="countdownMinutes">00</span>
                        <small>Minutes</small>
                    </div>
                    <div class="countdown-unit">
                        <span id="countdownSeconds">00</span>
                        <small>Seconds</small>
                    </div>
                </div>
            </div>
        </section>

        <!-- Product Showcase -->
        <section class="product-section">
            <div class="image-wrapper">
                <img src="" alt="PRIME MUN Box" id="productImage" class="product-image">
                <div class="glow-effect"></div>
            </div>
        </section>

        <!-- Highlights & Action -->
        <footer class="action-section">
            <p id="optionalLine" class="optional-line"></p>
            <img id="optionalLineImage" class="content-image optional-line-image" alt="Campaign promo line" hidden>
            
            <!-- Pie Icon (using SVG) -->
            <div class="dessert-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 21a9 9 0 0 0 9-9H3a9 9 0 0 0 9 9Z"/><path d="M12 12V3"/><path d="M16.2 7.8 12 12"/><path d="M7.8 7.8 12 12"/><path d="M12 8a4 4 0 0 1 4 4"/><path d="M8 12a4 4 0 0 1 4-4"/>
                </svg>
            </div>
            <div class="delivery-info">
                <span class="bolt">⚡</span>
                <span>Delivery in under 60 minutes</span>
                <div class="decor-lines"></div>
            </div>
        </footer>
    </main>

    <div class="cta-dock">
        <button id="ctaButton" class="btn-glovo">
            Order on WhatsApp
            <span class="location-dot"></span>
        </button>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
