<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160" preserveAspectRatio="none">
        <defs>
            <linearGradient id="reel-bg" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#E2E8F0" />
                <stop offset="50%" stop-color="#FFFFFF" />
                <stop offset="100%" stop-color="#E2E8F0" />
            </linearGradient>
            <linearGradient id="reel-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
                <stop offset="15%" stop-color="#000000" stop-opacity="0" />
                <stop offset="85%" stop-color="#000000" stop-opacity="0" />
                <stop offset="100%" stop-color="#000000" stop-opacity="0.3" />
            </linearGradient>
        </defs>
        <rect width="100" height="160" rx="12" fill="url(#reel-bg)" />
        <rect width="100" height="160" rx="12" fill="url(#reel-shadow)" />
    </svg>